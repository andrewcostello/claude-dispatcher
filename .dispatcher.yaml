# Per-repo dispatcher config (schema introduced in VG-1).
# test: shell command run inside a task worktree; exit 0 = green.
#
# Resolve a Python that has pytest (main checkout .venv preferred). Worktrees
# share the same git root metadata but usually lack their own .venv, so we
# walk a few known locations + DISPATCHER_TEST_PYTHON.
test: |
  set -e
  ROOT="$(git rev-parse --show-toplevel)"
  if [ -n "${DISPATCHER_TEST_PYTHON:-}" ] && [ -x "${DISPATCHER_TEST_PYTHON}" ]; then
    PY="${DISPATCHER_TEST_PYTHON}"
  elif [ -x "$ROOT/.venv/bin/python" ]; then
    PY="$ROOT/.venv/bin/python"
  elif [ -x /Users/andrewcostello/Projects/claude-dispatcher/.venv/bin/python ]; then
    PY=/Users/andrewcostello/Projects/claude-dispatcher/.venv/bin/python
  elif [ -x /home/andrew/Project/claude-dispatcher/.venv/bin/python ]; then
    PY=/home/andrew/Project/claude-dispatcher/.venv/bin/python
  else
    PY=python3
  fi
  PYTHONPATH=src "$PY" -m pytest tests/ -q --tb=line

# Cross-family panel: probationary advisory seats (VG-5).
panel:
  advisory: [grok]

# Dogfood: dispatcher run … --no-claude
