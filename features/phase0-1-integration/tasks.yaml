  - key: INT-4
    summary: "Dispatch-time dependency rule: dependents branch from base + blockedBy branches"
    description: |
      Proven mandatory by run #2's DISP-9/10/11/12 natural experiment (see
      docs/improvement-plan.md Dogfood log): when a dependent task dispatches
      before its dependencies' branches are integrated into base, the four
      observed Tasker behaviors were merge-the-branches (correct), narrow
      scope, fork the dependency, and read-via-object-store. Variance is too
      high to rely on; provide the code mechanically.

      Implement in the worktree/orchestrator path: when creating a dependent
      task's worktree, if any blockedBy task's final commits are not reachable
      from base, merge those branches into the new task branch immediately
      after creation (sequentially, in blockedBy order). On merge conflict
      between dependency branches: mark the dependent Blocked with reason
      dependency_merge_conflict and journal it — do not dispatch a Tasker
      into a conflicted tree. Journal the merged branch SHAs (extend
      task_started payload).

      Acceptance:
        - Fixture: A done-on-branch, B blockedBy A → B's worktree contains
          A's commits before spawn; merged SHAs in task_started payload
        - Conflicting dependency branches → Blocked(dependency_merge_conflict),
          no spawn, journal event present
        - No-op when dependencies are already on base (current behavior)
    type: Task
