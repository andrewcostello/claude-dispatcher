project: DISP
epic: PHASE-3-PRF
# ============================================================================
# Run #6: Phase 3 — PR-flow mode. Tasks PR into a run-level feature branch;
# the dispatcher owns mechanical merge ordering and a deterministic risk
# classifier drives the approval ladder. Source: docs/improvement-plan.md
# Phase 3 (including the dispatch-time dependency rule already shipped, the
# effective-diff counting rule, and the approval-ladder decision records).
#
# Meta: this run executes in classic mode while BUILDING pr mode; the first
# consumer of pr mode is the next run. This is also the first run protected
# by the Phase 4 verification gate (mechanical + LLM verifier active).
# ============================================================================

tasks:

  - key: PRF-1
    summary: "PR-flow run mode: run-level feature branch + config plumbing"
    description: |
      Add the integration mode switch. `dispatcher run --integration pr`
      (default remains today's behavior, name it `branch`) with optional
      --feature-branch NAME (default: feature/<epic from the tasks YAML>,
      sanitized). .dispatcher.yaml may set `integration: pr` as the repo
      default; CLI flag wins.

      In pr mode at run start: create the feature branch from base_branch if
      absent (record created|existing), and task worktrees branch FROM the
      feature branch (it becomes the effective base for worktree creation,
      dependency-merge reachability checks, and diff baselines). Genesis
      run_config records integration mode + feature branch + its SHA.

      Acceptance:
        - pr-mode run creates/reuses the feature branch; worktrees branch
          from it (fake-claude e2e asserts the worktree's merge-base)
        - branch mode byte-identical to today (regression: existing e2e
          suites untouched and green)
        - Genesis carries integration/feature_branch/feature_branch_sha
    type: Task
    estimate: 3h
    labels: [size:M, area:orchestrator, area:cli, phase:3]

  - key: PRF-2
    summary: "PR-flow states: auto-raise PRs against the feature branch; Awaiting Review"
    description: |
      In pr mode, after a task passes the verification gate (and panel when
      label-triggered): push the branch and raise its PR against the FEATURE
      branch automatically — no size-based parking for *raising* (gating
      moves to the merge step, PRF-4; record this rationale in the docs
      task). Reuse pr.py; PR body from the Tasker's prepared PR section when
      present, else generated from the summary.

      YAML lifecycle in pr mode: Done is no longer terminal — rows move to
      `Awaiting Review` (with pr_url, pr_number) and later `Merged` (PRF-4).
      plan.py: dependents' runnable/merge checks in pr mode treat only
      Merged as satisfied for MERGE ordering, while DISPATCH ordering keeps
      using Done-or-later (the dispatch-time dependency merge provides
      unmerged dependency code, as today). Journal: pr_opened event
      (number, url, target, base sha).

      Acceptance:
        - Fake-claude e2e (gh stubbed): verified task -> branch pushed, PR
          opened against feature branch, row Awaiting Review, journal event
        - Prepared-PR-section path and generated-body path both covered
        - branch mode unaffected
    type: Task
    estimate: 3h
    labels: [size:M, area:orchestrator, phase:3]
    blockedBy: [PRF-1]

  - key: PRF-3
    summary: "Deterministic risk classifier (effective-diff rule) in repo config"
    description: |
      New module risk.py implementing the plan's Phase 3 classifier.
      .dispatcher.yaml gains a `risk:` section with these defaults when
      absent (mirror the plan):
        max_size: S
        forbidden_labels: [security, critical, financial]
        forbidden_paths: ["**/migrations/**", "**/*.proto", "**/auth/**",
                          ".github/**", "go.mod", "go.sum", "pyproject.toml",
                          "Dockerfile*", "compose*.y*ml"]
        max_effective_diff_lines: 200
        test_globs: ["*_test.go", "**/testdata/**", "tests/**", "*.spec.*"]
        generated_globs: ["*.pb.go", "**/sqlc/**", "*_pb2.py"]
        docs_only_low_risk: true
      classify(task_row, worktree, base_ref) -> RiskVerdict(level: low |
      elevated, reasons: [str]). Effective diff = insertions+deletions in
      files NOT matching test/generated globs (counting rule shared with the
      plan's mutation escalation). ALL low-risk conditions must hold;
      docs-only (*.md only) is low-risk at any size; test-only diffs are NOT
      auto-low-risk. Require first-pass verification: verified on iteration
      0 (read from the row/journal fields VG-4 writes).

      Acceptance:
        - Table-driven unit tests: each rule individually flips low->elevated
          with the violated rule named in reasons
        - Effective-diff counting proven to exclude test/generated globs
        - Defaults load when risk: absent; partial risk: sections merge over
          defaults
    type: Task
    estimate: 3h
    labels: [size:M, area:config, phase:3]

  - key: PRF-4
    summary: "Mechanical merge engine: ordered, ladder-gated PR merges + merge-prs command"
    description: |
      The dispatcher owns merging in pr mode. A merge pass (run in the main
      loop after each task reaches Awaiting Review, and exposed standalone as
      `dispatcher merge-prs <run-id>` for post-run / next-morning catch-up):

      For each Awaiting Review row in topological (blockedBy) order, merge
      its PR into the feature branch when BOTH:
        a) approved per the ladder: risk low (PRF-3) -> dispatcher
           self-approves, recording pr_approved_by: dispatcher-agent +
           the classifier verdict; risk elevated -> require an external
           GitHub approval (gh pr view reviews) — the human/bot path — and
           until present, leave Awaiting Review and notify (existing notify
           channels, once per task not per pass).
        b) every blockedBy row is already Merged.
      Merge via gh pr merge --merge. Success -> row Merged + pr_merged
      journal event (merger identity, feature-branch sha). Conflict /
      unmergeable -> row stays Awaiting Review with needs_rebase: true +
      journal + notify; do NOT auto-rebase in this phase (recorded as a
      deliberate non-goal — the supervising agent handles rebases).

      Acceptance:
        - gh-stubbed e2e: low-risk chain A<-B merges in order; B never
          merges before A even if approved first
        - Elevated task without external approval stays Awaiting Review,
          notifies once; with stubbed approval, merges
        - Conflict path: needs_rebase journaled+notified, engine continues
          with other eligible PRs
        - merge-prs command works against a finished run's YAML/journal
    type: Task
    estimate: 4h
    labels: [size:M, area:orchestrator, area:cli, phase:3]
    blockedBy: [PRF-2, PRF-3]

  - key: PRF-5
    summary: "Surface PR-flow in status/report + run-complete semantics"
    description: |
      status: pr-mode rows show Awaiting Review / Merged, pr_number, risk
      level, approver, needs_rebase; run liveness distinguishes "tasks done,
      merges pending". report: rollup gains merged/awaiting counts, approver
      breakdown (self vs external), and lists unmerged PRs at run end.
      run_complete event in pr mode records merged/awaiting/needs_rebase
      counts. Notifier: run_complete message includes pending-merge summary
      (so the morning starts with one glanceable message).

      Acceptance:
        - status/report snapshots for a fixture pr-mode journal
        - run_complete payload counts asserted in e2e
        - branch-mode output unchanged
    type: Task
    estimate: 2h
    labels: [size:S, area:cli, phase:3]
    blockedBy: [PRF-4]

  - key: PRF-6
    summary: "Docs: PR-flow mode, risk classifier reference, ladder semantics"
    description: |
      README: "PR-flow mode" section (feature branch lifecycle, states
      diagram Done->Awaiting Review->Merged, merge ordering rule, the
      raise-vs-merge gating rationale, merge-prs command, needs_rebase
      handling as supervisor responsibility); .dispatcher.yaml reference
      gains integration: and risk: sections with the default block and the
      effective-diff counting rule; journal-format.md gains pr_opened /
      pr_merged / approval payloads. Note the deliberate non-goals:
      auto-rebase, and the external pr-reviewer bot being out of dispatcher
      scope (it just shows up as a GitHub approval).

      Acceptance:
        - Every new flag/command/config key/state/event documented
        - The plan's approval-ladder table reproduced and linked to the
          classifier defaults
    type: Task
    estimate: 2h
    labels: [size:S, area:docs, phase:3]
    blockedBy: [PRF-5]
