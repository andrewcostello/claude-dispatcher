  - key: OPS-2
    summary: "dispatcher doctor: probe machine profile (agents, tools, install mode)"
    description: |
      Implement the Phase 1a machine profile (docs/improvement-plan.md). New
      subcommand `dispatcher doctor`: probes the machine and writes
      ~/.config/claude-dispatcher/machine.yaml (XDG_CONFIG_HOME respected).

      Probe and record:
        - Agent CLIs: claude, agy, codex, grok, opencode, qwen — for each:
          present (shutil.which), path, --version output (parsed), and
          whether a stats/usage probe is known for it (static capability
          table is fine for now).
        - Tools: git, gh, docker, sqlc, buf — path + version.
        - Dispatcher itself: version (package metadata), install mode
          (pipx venv path vs editable/venv — detect from sys.prefix /
          __file__ heuristics, document the heuristic), python version.
        - Host: hostname, platform.
      Behavior: re-running doctor refreshes probed fields but preserves any
      keys under a `manual:` section untouched. `dispatcher doctor --check`
      exits non-zero with a human-readable list when required entries are
      missing (required = claude + git; everything else reported but soft).
      Round-trip the file with ruamel (comments preserved) like tasks.yaml.

      Acceptance:
        - doctor on this machine produces a profile listing at least claude,
          agy, codex, grok, opencode with real versions
        - manual: section survives a re-probe
        - --check semantics tested (required-missing fixture via PATH stub)
        - Unit tests use stub binaries on PATH, no network
