  - key: DISP-8
    summary: "Event journal module: hash-chained append-only JSONL per run"
    description: |
      New module journal.py. One JSONL file per run (runs/<run-id>/journal.jsonl
      or similar — propose location in the task summary). Each event: seq,
      timestamp, event type, task key (nullable), payload dict, prev_hash,
      hash (SHA-256 over canonical serialization of the event minus its own
      hash). Genesis event records: dispatcher version, tasks.yaml path +
      content hash, reviewer-prompts content hash, machine hostname.

      Event type enum (initial set): run_started, task_started,
      task_spawn_finished, summary_parsed, commit_retry, panel_started,
      panel_verdict, panel_iterate, task_done, task_blocked, pr_gate,
      integrate_result, notify_sent, run_complete.

      Writer: append + fsync; single-writer assumption documented (worker
      threads hand events to the orchestrator thread or use a lock — choose
      and document). Reader: iterate events, verify chain integrity, return
      typed records. `journal verify` helper for tests.

      Acceptance:
        - Round-trip: write N events, read back, chain verifies
        - Tamper test: editing any byte breaks verification at that event
        - Genesis event contains all four provenance fields
        - No orchestrator changes in this task (wiring is DISP-9)
